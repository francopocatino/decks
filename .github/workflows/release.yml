name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          swift --version

      - name: Build app bundle
        run: DECKS_VERSION="${GITHUB_REF_NAME#v}" ./scripts/bundle.sh

      - name: Package
        run: ditto -c -k --keepParent build/Decks.app Decks.app.zip

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" Decks.app.zip --title "$GITHUB_REF_NAME" --generate-notes
