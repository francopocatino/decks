name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          swift --version

      - name: Build macOS app
        run: swift build --package-path app

      - name: Test macOS app
        run: swift test --package-path app

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust format
        working-directory: cli
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: cli
        run: cargo clippy -- -D warnings

      - name: Rust tests
        working-directory: cli
        run: cargo test
